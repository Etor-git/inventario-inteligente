services:
  flask_app:
    build: .
    container_name: inventario_app
    command: sh -c "python app.py & streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "5001:5000"
      - "8501:8501"
    volumes:
      - ./app:/app
    depends_on:
      - mysql_db

  mysql_db:
    image: mysql:8.0
    container_name: inventario_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventario_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3307:3306"
    volumes:
      - ./mysql:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: inventario_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql_db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql_db